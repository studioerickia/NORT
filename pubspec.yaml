name: nort
description: "NORT — plataforma de bem-estar financeiro com a Blue."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.5.1

  # Roteamento
  go_router: ^14.2.0

  # Modelos imutáveis
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # i18n
  intl: ^0.19.0
  flutter_localizations:
    sdk: flutter

  # Web — URLs limpas (sem #), ver lib/main.dart
  flutter_web_plugins:
    sdk: flutter

  # Ícones
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Assets — habilitados desde já, mesmo vazios, para evitar
  # retrabalho de configuração quando os assets reais entrarem
  # (Component Library / Motion System, etapas seguintes).
  assets:
    - assets/icons/
    - assets/illustrations/
    - assets/lottie/
    - assets/images/

  # Fonts serão declaradas aqui quando a tipografia (Etapa 2 —
  # Design System) definir a família oficial. Mantido vazio por ora
  # para não referenciar arquivos de fonte inexistentes (quebraria o build).
  # fonts:
  #   - family: NortSans
  #     fonts:
  #       - asset: assets/fonts/NortSans-Regular.ttf
